ai:
  enabled: false
  model: deepseek-chat
  base_url: https://api.deepseek.com/v1
  prompt_version: quant-readonly-v1
  timeout_seconds: 120
  max_retries: 2
  max_input_chars: 30000
  max_completion_tokens: 1500
  max_total_tokens_per_evaluation: 8000
  dimensions:
    - backtest
    - signal
    - signal_explanation
    - anomaly
