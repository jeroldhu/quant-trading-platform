schema_version: "1.0.0"

# 交易日历不是用行情是否出现来猜测，而是由两家交易所年度休市公告共同确认。
# 每年新公告发布后必须先补充本文件，未覆盖年份会明确阻断正式信号。
years:
  # 2015-2024 的日期由历年 SSE/SZSE 年度公告整理；available_at 采用
  # 当年 1 月 1 日这一保守可用时点，避免把公告实际发布日期记得过早。
  2015:
    sources:
      - {source_id: sse_calendar_2015, exchange: SSE, upstream_domain: sse.com.cn, version: "sse-annual-calendar-2015", url: "https://www.sse.com.cn/disclosure/dealinstruc/closed/list/", available_at: "2015-01-01T00:00:00+08:00"}
      - {source_id: szse_calendar_2015, exchange: SZSE, upstream_domain: szse.cn, version: "szse-annual-calendar-2015", url: "https://www.szse.cn/disclosure/notice/general/index.html", available_at: "2015-01-01T00:00:00+08:00"}
    closures:
      - {start: 2015-01-01, end: 2015-01-02, reason: 年度公告休市}
