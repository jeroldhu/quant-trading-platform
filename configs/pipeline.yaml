collection:
  asset_types: [etf]
  scope: full_market
  exchanges: [SSE, SZSE]
  include_delisted: true
  adjustments: [raw, qfq]
  datasets:
    - etf_master
    - etf_daily_bar
    - index_daily
    - trade_calendar
  benchmarks: ["000300.SH"]
  configured_instruments: []

history:
  start: "2015-01-01"
  end: latest_trade_date
  respect_listing_date: true

incremental:
  overlap_trade_days: 5

quality:
  min_publish_coverage: 0.99
  min_independent_sources: 2

sources:
  eastmoney:
    enabled: true
    required: true
  tencent:
    enabled: true
    required: false
    fallback_ttl_hours: 24
  ths:
    enabled: true
    required: true
  tdx:
    enabled: true
    required: true
  baostock:
    enabled: false
    required: false
    max_stale_days: 7
  tushare:
    enabled: false
    required: false
    note: "增强源，仅用于股票信息补充"
  akshare:
    enabled: false
    required: false
    note: "板块发现源，不影响 ETF 门禁"
